name: Continuous Deployment
on:
  push:
    branches:
      - "main"
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  build:
    env:
      DO_NOT_TRACK: 1
    name: Build, test, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Run CLI
        run: apps/cli/dist/cli.js generate ts examples/kitchen-sink/src/kitchen-sink.shaclmate.ttl >/dev/null
      - name: Publish
        run: npm publish --access public --workspaces
      # - name: Run CLI via npx
      #   run: npx -y "@shaclmate/cli@latest" generate ts examples/kitchen-sink/src/kitchen-sink.shaclmate.ttl >/dev/null
      #   if: always()
